<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cellular Art</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #stage { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
    #ui {
      position: fixed; bottom: 20px; right: 20px; z-index: 10;
    }
    button {
      background: rgba(255,255,255,0.08); color: #eee;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      padding: 8px 14px; cursor: pointer; font-size: 13px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: background 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>
  <canvas id="stage" aria-label="Cellular art canvas"></canvas>
  <div id="ui">
    <button id="resetBtn" type="button">Reset</button>
  </div>

  <script>
    const CELL_PX = 6;
    const STEP_MS = 55;
    const BG_SPEED = 0.00018;  // ~28s per cycle, slow ambient drift

    const canvas = document.getElementById("stage");
    const resetBtn = document.getElementById("resetBtn");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const simCanvas = document.createElement("canvas");
    const simCtx = simCanvas.getContext("2d");

    let NW, NH, grid, next, trail, age, imageData, cellRow, cellCol;
    let alive = 0;
    let frame = 0;
    let lastStepTime = 0;

    function initGrid() {
      NW = Math.ceil(canvas.width  / CELL_PX);
      NH = Math.ceil(canvas.height / CELL_PX);
      const sz = NW * NH;
      grid    = new Uint8Array(sz);
      next    = new Uint8Array(sz);
      trail   = new Float32Array(sz);
      age     = new Float32Array(sz);
      cellRow = new Float32Array(sz);
      cellCol = new Float32Array(sz);
      for (let i = 0; i < sz; i++) {
        cellRow[i] = ((i / NW) | 0) / NH;
        cellCol[i] = (i % NW) / NW;
      }
      alive = 0;
      simCanvas.width  = NW;
      simCanvas.height = NH;
      imageData = simCtx.createImageData(NW, NH);
    }

    function fitCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
      initGrid();
    }
    fitCanvas();
    window.addEventListener("resize", fitCanvas);

    function idx(row, col) {
      row = ((row % NH) + NH) % NH;
      col = ((col % NW) + NW) % NW;
      return row * NW + col;
    }

    function seedAtNormalized(nx, ny) {
      const row = Math.max(0, Math.min(NH - 1, Math.floor(ny * NH)));
      const col = Math.max(0, Math.min(NW - 1, Math.floor(nx * NW)));
      const radius = 5;

      const center = idx(row, col);
      if (grid[center] === 0) alive++;
      grid[center] = 1;
      trail[center] = Math.max(trail[center], 3.2);
      age[center]   = Math.max(age[center], 8.0);

      for (let dr = -radius; dr <= radius; dr++) {
        for (let dc = -radius; dc <= radius; dc++) {
          const d2 = dr * dr + dc * dc;
          if (d2 > radius * radius) continue;
          const r = row + dr;
          const c = col + dc;
          if (r < 0 || r >= NH || c < 0 || c >= NW) continue;
          if (Math.random() < 0.56 - d2 * 0.01) {
            const i = idx(r, c);
            if (grid[i] === 0) alive++;
            grid[i] = 1;
            trail[i] = Math.max(trail[i], 1.8 - 0.10 * Math.sqrt(d2));
          }
        }
      }
      drawFrame(performance.now());
    }

    function stepLife() {
      let nextAlive = 0;
      for (let row = 0; row < NH; row++) {
        for (let col = 0; col < NW; col++) {
          const i = idx(row, col);
          const n =
            grid[idx(row-1,col-1)] + grid[idx(row-1,col)] + grid[idx(row-1,col+1)] +
            grid[idx(row,  col-1)] +                         grid[idx(row,  col+1)] +
            grid[idx(row+1,col-1)] + grid[idx(row+1,col)] + grid[idx(row+1,col+1)];
          const live = grid[i] === 1;
          const stays = n === 3 || (live && n === 2);
          next[i] = stays ? 1 : 0;
          if (stays) nextAlive++;
        }
      }
      [grid, next] = [next, grid];
      alive = nextAlive;
    }

    function drawFrame(now) {
      const data = imageData.data;
      const T = now * BG_SPEED;
      const phase = 0.055 * frame;

      for (let i = 0; i < grid.length; i++) {
        const cell = grid[i];
        age[i]   = cell ? Math.min(age[i] + 1.0, 50.0) : age[i] * 0.90;
        trail[i] = 0.94 * trail[i] + 1.15 * cell;

        const row = cellRow[i];
        const col = cellCol[i];
        const wave =
          Math.sin(5.5 * row + 3.1 * col + T * 1.3        ) * 0.4 +
          Math.sin(3.7 * col - 2.9 * row + T * 0.9 + 1.1  ) * 0.3 +
          Math.sin(7.1 * (row + col) * 0.5 + T * 1.7 + 2.4) * 0.3;
        // wave ∈ [-1, 1] → bg ∈ [0.04, 0.20] → roughly 10–50/255, visible in dark room
        const bg = 0.12 + 0.08 * wave;

        const t = 0.72 * trail[i] + 0.35 * age[i];
        const glow = Math.max(0, Math.min(1, 0.2 + 0.8 * Math.tanh(0.9 * trail[i])));
        const r = bg + glow * (0.5 + 0.5 * Math.sin(1.15 * t + phase + 0.0));
        const g = bg + glow * (0.5 + 0.5 * Math.sin(1.05 * t + phase + 2.2));
        const b = bg + glow * (0.5 + 0.5 * Math.sin(1.25 * t + phase + 4.4));

        const o = i * 4;
        data[o]     = Math.max(0, Math.min(255, (r * 255) | 0));
        data[o + 1] = Math.max(0, Math.min(255, (g * 255) | 0));
        data[o + 2] = Math.max(0, Math.min(255, (b * 255) | 0));
        data[o + 3] = 255;
      }
      simCtx.putImageData(imageData, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(simCanvas, 0, 0, NW, NH, 0, 0, canvas.width, canvas.height);
    }

    function tick(now) {
      if (now - lastStepTime >= STEP_MS) {
        if (alive > 0) stepLife();
        frame++;
        lastStepTime = now;
      }
      drawFrame(now);
      requestAnimationFrame(tick);
    }

    function handlePointer(e) {
      const rect = canvas.getBoundingClientRect();
      const nx = Math.min(Math.max((e.clientX - rect.left) / rect.width,  0), 1);
      const ny = Math.min(Math.max((e.clientY - rect.top)  / rect.height, 0), 1);
      seedAtNormalized(nx, ny);
    }

    function resetAll() {
      grid.fill(0); next.fill(0); trail.fill(0); age.fill(0);
      alive = 0;
    }

    let isPointerDown = false;

    canvas.addEventListener("pointerdown", e => {
      isPointerDown = true;
      canvas.setPointerCapture(e.pointerId);
      handlePointer(e);
    });
    canvas.addEventListener("pointermove", e => {
      if (isPointerDown) handlePointer(e);
    });
    canvas.addEventListener("pointerup",     e => { isPointerDown = false; });
    canvas.addEventListener("pointercancel", e => { isPointerDown = false; });
    resetBtn.addEventListener("click", resetAll);
    lastStepTime = performance.now();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
